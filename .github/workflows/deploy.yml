name: Deploy Zero Evolution

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout do código
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 📦 Instalar e Build
        run: |
          npm install
          chmod +x node_modules/.bin/vite
          npm run build

      - name: 🚀 Sync via FTP (Clean Deploy)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Caminho absoluto confirmado pelo log de sucesso
          server-dir: /home/evolution32/public_html/teste/
          # Comando correto para limpar arquivos antigos no servidor
          dangerous-clean-slate: true
