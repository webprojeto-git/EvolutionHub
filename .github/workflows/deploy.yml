name: Deploy Teste Evolution

on:
  push:
    branches:
      - master # Sua branch atual confirmada
  workflow_dispatch: # Permite rodar o deploy manualmente pelo painel do GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout do código
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22 # Versão compatível com as dependências atuais

      - name: 📦 Instalar e Build
        run: |
          npm install
          chmod +x node_modules/.bin/vite # Resolve erro de "Permission denied"
          npm run build

      - name: 🚀 Sync via FTP para Pasta de Teste
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Alvo alterado para a subpasta de visualização do cliente
          server-dir: /home/evolution32/public_html/teste/
