name: Deploy Oficial Evolution

on:
  push:
    branches:
      - main # Verifique se sua branch é 'main' ou 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout do código
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22 # Atualizado para evitar o erro EBADENGINE

      - name: 📦 Instalar e Build
        run: |
          npm install
          chmod +x node_modules/.bin/vite # Garante permissão de execução para o Vite
          npm run build

      - name: 🚀 Sync via FTP Locaweb
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /home/evolution32/public_html/
