name: Deploy Oficial Evolution

on:
  push:
    branches:
      - master # Branch corrigida para disparar a automação
  workflow_dispatch: # Adicionado para permitir disparar manualmente se necessário

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout do código
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node v22
        uses: actions/setup-node@v3
        with:
          node-version: 22 # Versão necessária para o Vite atual

      - name: 📦 Instalar e Build
        run: |
          npm install
          chmod +x node_modules/.bin/vite # Resolve o erro "Permission denied"
          npm run build

      - name: 🚀 Sync via FTP Locaweb
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /home/evolution32/public_html/
